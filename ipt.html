<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IPTV Fullscreen Logo</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  font-family: Arial, sans-serif;
}

#player {
  width: 100%;
  height: 100%;
  position: relative;
}

/* BARRA TIPO CANAL */
#channelBar {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 14px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  text-align: right;
}

/* MENÚ CALIDAD */
#qualityMenu {
  position: absolute;
  bottom: 60px;
  right: 10px;
  background: rgba(0,0,0,0.85);
  padding: 8px;
  border-radius: 6px;
  z-index: 9999;
  font-size: 14px;
}

#qualityMenu div {
  color: #fff;
  padding: 4px 8px;
  cursor: pointer;
}

#qualityMenu div:hover {
  background: #333;
}

/* Indicador calidad flotante */
#qualityLabel {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 4px 8px;
  border-radius: 6px;
  z-index: 9999;
  font-size: 13px;
}

/* LOGO */
#playerLogo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 90px;
  opacity: 0.9;
  z-index: 9999;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="player"></div>
<div id="channelBar">
  <div id="channelName">Goat Futbol</div>
  <div id="channelTime">--:--</div>
</div>

<div id="qualityMenu"></div>
<div id="qualityLabel">AUTO</div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.32.0/jwplayer.js"></script>
<script>
jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

const mpdUrl = "https://d3kzwqwnq1f7tq.cloudfront.net/out/v1/25ca218d53194065bedf6d998ace462e/index.mpd";

const player = jwplayer("player").setup({
  playlist: [{
    sources: [{
      file: mpdUrl,
      type: "dash",
      drm: {
        clearkey: {
          keyId: "1c62a216a5fe423f959cb1ca02f62d83",
          key: "54f2fdc83c1da33cd9269bf21e08218c"
        }
      }
    }]
  }],
  width: "100%",
  height: "100%",
  controls: true,
  preload: "auto",
  live: { dvrSeekLimit: 3600 },
  dash: { bufferLength: 6, maxBufferLength: 20 }
});

// 🔥 LOGO dentro del contenedor JW Player
player.on("ready", function() {
  const container = document.querySelector("#player");
  const logo = document.createElement("img");
  logo.id = "playerLogo";
  logo.src = "https://i.imgur.com/7V8wr1v.png";
  container.appendChild(logo);
});

// Actualizar hora en vivo
function actualizarHora() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById("channelTime").innerText = `${h}:${m}`;
}
setInterval(actualizarHora, 1000);
actualizarHora();

// Calidad inteligente y menú tipo IPTV
let levelsList = [];
let highestIndex = null;
let safeIndex = null;
let autoMode = true;

const label = document.getElementById("qualityLabel");
const menu = document.getElementById("qualityMenu");

player.on("levels", function(data) {
  levelsList = data.levels || [];
  if (!levelsList.length) return;

  const sorted = levelsList.map((lvl, i) => ({
    i,
    height: lvl.height || 0,
    bandwidth: lvl.bandwidth || 0
  })).sort((a, b) => (b.height + b.bandwidth) - (a.height + a.bandwidth));

  highestIndex = sorted[0].i;
  safeIndex = sorted[1] ? sorted[1].i : highestIndex;

  setTimeout(() => {
    player.setCurrentQuality(safeIndex);
  }, 1000);

  // Crear menú IPTV
  menu.innerHTML = "";
  const autoBtn = document.createElement("div");
  autoBtn.innerText = "AUTO";
  autoBtn.onclick = () => { autoMode = true; label.innerText = "AUTO"; };
  menu.appendChild(autoBtn);

  levelsList.forEach((lvl, i) => {
    const btn = document.createElement("div");
    btn.innerText = (lvl.height || "?") + "p";
    btn.onclick = () => { autoMode = false; player.setCurrentQuality(i); label.innerText = btn.innerText; };
    menu.appendChild(btn);
  });
});

// AUTO inteligente
let lastStable = Date.now();
player.on("time", function() {
  if (!autoMode || highestIndex === null) return;
  const now = Date.now();
  if (now - lastStable > 8000) {
    try { player.setCurrentQuality(highestIndex); } catch(e){}
  }
});
player.on("buffer", function() { lastStable = Date.now(); });
player.on("visualQuality", function(info) {
  if (!info) return;
  if (autoMode) label.innerText = "AUTO " + (info.label || "");
});
</script>

</body>
</html>
