<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IPTV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
#video { width:100%; height:60vh; background:#000; }
.channel { padding:10px; border-bottom:1px solid #333; cursor:pointer; }
.channel:hover { background:#111; }
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<div id="list"></div>

<script>
const vid = document.getElementById("video");
let shakaInstance = new shaka.Player(vid);

// ==================== DASH CHANNELS ====================
const dashChannels = {
  "espn": {
    mpd: "https://cdn.cvattv.com.ar/live/c3eds/ESPN2HD/SA_Live_dash_enc_2A_wl/ESPN2HD.mpd",
    keys: { "e884b711ab111beb8a7ba1e7bcbdc9bf": "cb89ee3961599e3e648a5aad60895f34" }
  },
  "espn2": {
    mpd: "https://cdn.cvattv.com.ar/live/c6eds/ESPN2_Arg/SA_Live_dash_enc_2A_wl/ESPN2_Arg.mpd",
    keys: { "65a5bfa3c7a72dde60be9b0c7406c8fc": "0b40ae9f78a7bac3b57ecbf72d3c081e" }
  }
};

// ==================== CHANNEL LIST ====================
const channels = [
  { name: "ESPN", id: "espn" },
  { name: "ESPN 2", id: "espn2" }
];

// ==================== LOAD CHANNEL ====================
async function loadCH(id) {
  if (dashChannels[id]) {
    const { mpd, keys } = dashChannels[id];
    try {
      shakaInstance.configure({ drm: { clearKeys: keys } });
      await shakaInstance.load(mpd);
      vid.play().catch(()=>{});
    } catch(e) {
      console.error("DASH error:", e);
    }
  }
}

// ==================== UI ====================
const list = document.getElementById("list");

channels.forEach(ch => {
  const div = document.createElement("div");
  div.className = "channel";
  div.innerText = ch.name;
  div.onclick = () => loadCH(ch.id);
  list.appendChild(div);
});
</script>

</body>
</html>
