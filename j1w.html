<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  height: 100%;
  overflow: hidden;
}

#player {
  width: 100%;
  height: 100%;
}

/* Indicador calidad */
#qualityLabel {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 6px 10px;
  font-size: 13px;
  border-radius: 6px;
  z-index: 9999;
}

/* Menú calidad */
#qualityMenu {
  position: absolute;
  bottom: 60px;
  right: 10px;
  background: rgba(0,0,0,0.85);
  padding: 8px;
  border-radius: 6px;
  z-index: 9999;
  font-family: Arial;
}

#qualityMenu div {
  color: #fff;
  padding: 4px 8px;
  cursor: pointer;
}

#qualityMenu div:hover {
  background: #333;
}
</style>
</head>

<body>

<div id="player"></div>
<div id="qualityLabel">AUTO</div>
<div id="qualityMenu"></div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.32.0/jwplayer.js"></script>

<script>
jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo"; // ← pon tu key

const mpdUrl = "https://cors-proxy.cooks.fyi/https://cdnlb.gigared.com.ar/live/eds/Canal_9/sa_live_dash/Canal_9.mpd";

const player = jwplayer("player").setup({
  playlist: [{
    sources: [{
      file: mpdUrl,
      type: "dash",
      drm: {
        clearkey: {
          keyId: "eaecaad505a66fab4161959099767384",
          key: "ca66afd7ba0f3ce767b698b5e94c84e3"
        }
      }
    }]
  }],
  width: "100%",
  height: "100%",
  autostart: false,
  controls: true,
  preload: "auto",
  live: { dvrSeekLimit: 3600 },
  dash: { bufferLength: 6, maxBufferLength: 20 }
});

let levelsList = [];
let highestIndex = null;
let safeIndex = null;
let autoMode = true;

const label = document.getElementById("qualityLabel");
const menu = document.getElementById("qualityMenu");

// Detectar calidades
player.on("levels", function(data) {
  levelsList = data.levels || [];
  if (!levelsList.length) return;

  const sorted = levelsList.map((lvl, i) => ({
    i,
    height: lvl.height || 0,
    bandwidth: lvl.bandwidth || 0
  })).sort((a, b) => (b.height + b.bandwidth) - (a.height + a.bandwidth));

  highestIndex = sorted[0].i;
  safeIndex = sorted[1] ? sorted[1].i : highestIndex;

  // iniciar en calidad estable
  setTimeout(() => {
    player.setCurrentQuality(safeIndex);
  }, 1000);

  crearMenu();
});

// Crear menú calidad
function crearMenu() {
  menu.innerHTML = "";

  // AUTO
  const autoBtn = document.createElement("div");
  autoBtn.innerText = "AUTO";
  autoBtn.onclick = () => {
    autoMode = true;
    label.innerText = "AUTO";
  };
  menu.appendChild(autoBtn);

  // niveles
  levelsList.forEach((lvl, i) => {
    const btn = document.createElement("div");
    btn.innerText = (lvl.height || "?") + "p";

    btn.onclick = () => {
      autoMode = false;
      player.setCurrentQuality(i);
      label.innerText = btn.innerText;
    };

    menu.appendChild(btn);
  });
}

// AUTO inteligente
let lastStable = Date.now();

player.on("time", function() {
  if (!autoMode || highestIndex === null) return;

  const now = Date.now();

  if (now - lastStable > 8000) {
    try {
      player.setCurrentQuality(highestIndex);
    } catch(e){}
  }
});

// Buffer → no forzar
player.on("buffer", function() {
  lastStable = Date.now();
});

// Mostrar calidad actual
player.on("visualQuality", function(info) {
  if (!info) return;

  if (autoMode) {
    label.innerText = "AUTO " + (info.label || "");
  }
});
</script>

</body>
</html>
