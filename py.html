<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <style>
    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      background: #000; overflow: hidden; 
    }

    #player-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 9999; background: #000;
    }

    /* 🔥 ROTACIÓN PARA iOS */
    .ios-landscape {
      transform: rotate(90deg);
      transform-origin: center center;
      width: 100vh !important; 
      height: 100vw !important;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-top: -50vw; 
      margin-left: -50vh;
      z-index: 10000;
    }

    * { -webkit-tap-highlight-color: transparent; outline: none; }
  </style>
</head>
<body>

  <div id="player-container"></div>

  <script src="https://cdn.jsdelivr.net/gh/clappr/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/clappr/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>

  <script>
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

    const player = new Clappr.Player({
      parentId: "#player-container",
      plugins: [DashShakaPlayback],
      source: "https://cors-proxy.wangzhishi.net/https://tvfuego.cdn.rcs.net.ar/HGxWMSZtXcn2A3b9zrDfUL/lpi5300000011aspgysk33uc55vuihwg/output.mpd",
      
      shakaConfiguration: {
        preferredAudioLanguage: 'es',
        drm: {
          clearKeys: {
            "6a47917ca83343ea8dcca63189e36d78": "84b0fe420ed5de7ef83c608d78d74f15"
          }
        },
        streaming: {
          lowLatencyMode: true,
          jumpLargeGaps: true
        }
      },

      autoPlay: true,
      width: "100vw",
      height: "100vh",
      mute: false,
      disableVideoTagContextMenu: true
    });

    // ==========================================
    // GESTOS: Fullscreen y Bloqueo de Pausa
    // ==========================================
    player.on(Clappr.Events.PLAYER_READY, function() {
      const video = document.querySelector("#player-container video");
      if (!video) return;

      let lastTap = 0;

      // Doble Tap -> Fullscreen
      video.addEventListener('touchend', function(e) {
        const now = new Date().getTime();
        const timesince = now - lastTap;
        
        if (timesince < 300 && timesince > 0) {
          if (player.core.isFullscreen()) {
            player.core.exitFullscreen();
          } else {
            player.core.toggleFullscreen();
          }
          e.preventDefault();
        }
        lastTap = now;
      });

      // Evita pausa y retroceso al tocar una vez
      video.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, true);
    });

    // =========================
    // LÓGICA DE ORIENTACIÓN
    // =========================
    player.on("fullscreen", async function(isFullscreen) {
      const contenedor = document.getElementById("player-container");
      
      if (isFullscreen) {
        if (!isIOS && screen.orientation?.lock) {
          try { await screen.orientation.lock("landscape"); } catch(e) {}
        } else if (isIOS) {
          contenedor.classList.add("ios-landscape");
        }
      } else {
        if (!isIOS && screen.orientation?.unlock) {
          try { screen.orientation.unlock(); } catch(e) {}
        }
        if (isIOS) contenedor.classList.remove("ios-landscape");
      }
    });

    // =========================
    // WAKELOCK (Pantalla siempre encendida)
    // =========================
    let wakeLock = null;
    async function activarWakeLock() {
      if ("wakeLock" in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request("screen");
        } catch (err) {}
      }
    }
    player.on("play", () => activarWakeLock());
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") activarWakeLock();
    });

  </script>
</body>
</html>
