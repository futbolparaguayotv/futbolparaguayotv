<!DOCTYPE html>
<html lang="es">
<head>

  <script src="https://unsettledradiator.com/55/e8/cb/55e8cb90311be645dd27b181f2cf3730.js"></script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IPTV Fullscreen Logo JW</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  font-family: Arial, sans-serif;
}

#player {
  width: 100%;
  height: 100%;
  position: relative;
}

/* BARRA TIPO CANAL */
#channelBar {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 14px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  text-align: right;
}

/* MENÚ CALIDAD */
#qualityMenu {
  position: absolute;
  bottom: 60px;
  right: 10px;
  background: rgba(0,0,0,0.85);
  padding: 8px;
  border-radius: 6px;
  z-index: 9999;
  font-size: 14px;
}

#qualityMenu div {
  color: #fff;
  padding: 4px 8px;
  cursor: pointer;
}

#qualityMenu div:hover {
  background: #333;
}
</style>
</head>
<body>

<div id="player"></div>

<div id="channelBar">
  <div id="channelName">Goat Futbol</div>
  <div id="channelTime">--:--</div>
</div>

<div id="qualityMenu"></div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.32.0/jwplayer.js"></script>
<script>
jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

const mpdUrl = "https://sam-py-edge05.tigo.com.py/ccur-session/add6b8c1b0ff3e564f17f58f226e072571869781125b89d0ebcb8bdf9614b083&s=69d975816e/out/v1/c2cc7832b5b64aedacb0e459fd9d8398/index.mpd";

const player = jwplayer("player").setup({
  playlist: [{
    sources: [{
      file: mpdUrl,
      type: "dash",
      drm: {
        clearkey: {
          keyId: "2245f48a5998442f835099d30f2e0305",
          key: "f48f6ce816fe86d8c10587e9a7e927a3"
        }
      }
    }]
  }],
  width: "100%",
  height: "100%",
  controls: true,
  preload: "auto",
  live: { dvrSeekLimit: 3600 },
  dash: { bufferLength: 6, maxBufferLength: 20 },

  // 🔥 LOGO JWPlayer (siempre visible, incluso fullscreen)
  logo: {
    file: "https://i.imgur.com/7V8wr1v.png",
    position: "top-left",
    hide: false,
    margin: 10
  }
});

// Actualizar hora en vivo
function actualizarHora() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById("channelTime").innerText = `${h}:${m}`;
}
setInterval(actualizarHora, 1000);
actualizarHora();

// Calidad inteligente y menú tipo IPTV
let levelsList = [];
let highestIndex = null;
let safeIndex = null;
let autoMode = true;

const menu = document.getElementById("qualityMenu");

player.on("levels", function(data) {
  levelsList = data.levels || [];
  if (!levelsList.length) return;

  const sorted = levelsList.map((lvl, i) => ({
    i,
    height: lvl.height || 0,
    bandwidth: lvl.bandwidth || 0
  })).sort((a, b) => (b.height + b.bandwidth) - (a.height + a.bandwidth));

  highestIndex = sorted[0].i;
  safeIndex = sorted[1] ? sorted[1].i : highestIndex;

  setTimeout(() => {
    player.setCurrentQuality(safeIndex);
  }, 1000);

  // Crear menú IPTV
  menu.innerHTML = "";
  const autoBtn = document.createElement("div");
  autoBtn.innerText = "AUTO";
  autoBtn.onclick = () => { autoMode = true; };
  menu.appendChild(autoBtn);

  levelsList.forEach((lvl, i) => {
    const btn = document.createElement("div");
    btn.innerText = (lvl.height || "?") + "p";
    btn.onclick = () => { autoMode = false; player.setCurrentQuality(i); };
    menu.appendChild(btn);
  });
});

// AUTO inteligente
let lastStable = Date.now();
player.on("time", function() {
  if (!autoMode || highestIndex === null) return;
  const now = Date.now();
  if (now - lastStable > 8000) {
    try { player.setCurrentQuality(highestIndex); } catch(e){}
  }
});
player.on("buffer", function() { lastStable = Date.now(); });
</script>

</body>
</html>
